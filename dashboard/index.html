<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirLock — Security Dashboard</title>
<meta name="description" content="AirLock AI API Security Proxy — real-time threat monitoring dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design Tokens ── */
:root {
  --bg:       #080c10;
  --surface:  #0d1117;
  --surface2: #161b22;
  --border:   #21262d;
  --text:     #e6edf3;
  --text-dim: #8b949e;
  --teal:     #00d4aa;
  --red:      #ff4d6d;
  --orange:   #ffa500;
  --blue:     #58a6ff;
  --mono:     'JetBrains Mono', monospace;
  --heading:  'Syne', sans-serif;
}

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Grid Texture Overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(0, 212, 170, .03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 170, .03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── Scan-line Animation ── */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  z-index: 9999;
  pointer-events: none;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  animation: scanline 4s linear infinite;
  opacity: 0.5;
}
@keyframes scanline {
  0%   { top: 0; }
  100% { top: 100vh; }
}

/* ── Layout Container ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo {
  font-family: var(--heading);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: var(--teal); }
.version {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--teal);
  font-weight: 600;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--teal);
  display: inline-block;
  margin-right: 5px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, .5); }
  50%      { box-shadow: 0 0 0 6px rgba(0, 212, 170, 0); }
}
</style>
</head>
<body>
</body>
</html>
