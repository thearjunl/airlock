<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirLock — Security Dashboard</title>
<meta name="description" content="AirLock AI API Security Proxy — real-time threat monitoring dashboard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design Tokens ── */
:root {
  --bg:       #080c10;
  --surface:  #0d1117;
  --surface2: #161b22;
  --border:   #21262d;
  --text:     #e6edf3;
  --text-dim: #8b949e;
  --teal:     #00d4aa;
  --red:      #ff4d6d;
  --orange:   #ffa500;
  --blue:     #58a6ff;
  --mono:     'JetBrains Mono', monospace;
  --heading:  'Syne', sans-serif;
}

body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Grid Texture Overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image:
    linear-gradient(rgba(0, 212, 170, .03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 170, .03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ── Scan-line Animation ── */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  z-index: 9999;
  pointer-events: none;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  animation: scanline 4s linear infinite;
  opacity: 0.5;
}
@keyframes scanline {
  0%   { top: 0; }
  100% { top: 100vh; }
}

/* ── Layout Container ── */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 20px;
  position: relative;
  z-index: 1;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.logo {
  font-family: var(--heading);
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.logo span { color: var(--teal); }
.version {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--teal);
  font-weight: 600;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--teal);
  display: inline-block;
  margin-right: 5px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0, 212, 170, .5); }
  50%      { box-shadow: 0 0 0 6px rgba(0, 212, 170, 0); }
}

/* ── Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 14px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  position: relative;
  overflow: hidden;
  opacity: 0;
  transform: translateY(16px);
  animation: fadeUp .5s ease forwards;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  border-radius: 10px 10px 0 0;
}
.stat-card.teal::before  { background: var(--teal); }
.stat-card.red::before   { background: var(--red); }
.stat-card.orange::before { background: var(--orange); }
.stat-card.blue::before  { background: var(--blue); }

.stat-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.stat-value {
  font-family: var(--heading);
  font-size: 32px;
  font-weight: 700;
}
.stat-card.teal .stat-value   { color: var(--teal); }
.stat-card.red .stat-value    { color: var(--red); }
.stat-card.orange .stat-value { color: var(--orange); }
.stat-card.blue .stat-value   { color: var(--blue); }

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ── Event Log ── */
.section-title {
  font-family: var(--heading);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '>';
  color: var(--teal);
}
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: auto;
  margin-bottom: 32px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 800px;
}
thead { background: var(--surface2); }
th {
  padding: 12px 14px;
  text-align: left;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .8px;
  font-size: 10px;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover { background: rgba(0, 212, 170, .04); }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.badge-l1       { background: rgba(0,212,170,.15); color: var(--teal);   border: 1px solid rgba(0,212,170,.3); }
.badge-l2       { background: rgba(88,166,255,.15); color: var(--blue);  border: 1px solid rgba(88,166,255,.3); }
.badge-high     { background: rgba(255,77,109,.15); color: var(--red);   border: 1px solid rgba(255,77,109,.3); }
.badge-medium   { background: rgba(255,165,0,.15);  color: var(--orange); border: 1px solid rgba(255,165,0,.3); }
.badge-blocked  { background: rgba(255,77,109,.2);  color: var(--red);   border: 1px solid rgba(255,77,109,.4); }
.badge-sandboxed { background: rgba(255,165,0,.2);  color: var(--orange); border: 1px solid rgba(255,165,0,.4); }

/* ── Cell Helpers ── */
.snippet {
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-dim);
  cursor: help;
  font-size: 11px;
}
.snippet:hover {
  white-space: normal;
  word-break: break-all;
  color: var(--text);
}
.time-cell  { color: var(--text-dim); font-size: 11px; white-space: nowrap; }
.id-cell    { color: var(--teal); font-weight: 600; }
.model-cell { color: var(--text-dim); }
.empty-state {
  padding: 40px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

/* ── Footer ── */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 11px;
  color: var(--text-dim);
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.footer a {
  color: var(--teal);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .header { flex-direction: column; align-items: flex-start; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header" id="dashboardHeader">
    <div class="header-left">
      <div class="logo"><span>Air</span>Lock</div>
      <span class="version">v0.1.0</span>
    </div>
    <div class="header-right">
      <span>Upstream: <strong style="color:var(--text)">api.openai.com</strong></span>
      <span><span class="status-dot"></span><strong style="color:var(--teal)">ACTIVE</strong></span>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card teal" style="animation-delay:.0s"><div class="stat-label">Total Requests</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat-card red" style="animation-delay:.05s"><div class="stat-label">Blocked</div><div class="stat-value" id="statBlocked">0</div></div>
    <div class="stat-card teal" style="animation-delay:.1s"><div class="stat-label">L1 StreamGuard</div><div class="stat-value" id="statL1">0</div></div>
    <div class="stat-card blue" style="animation-delay:.15s"><div class="stat-label">L2 ContextSandbox</div><div class="stat-value" id="statL2">0</div></div>
    <div class="stat-card red" style="animation-delay:.2s"><div class="stat-label">High Severity</div><div class="stat-value" id="statHigh">0</div></div>
    <div class="stat-card orange" style="animation-delay:.25s"><div class="stat-label">Medium Severity</div><div class="stat-value" id="statMedium">0</div></div>
  </div>

  <!-- Event Log -->
  <div class="section-title">Threat Event Log</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Time</th>
          <th>Layer</th>
          <th>Threat</th>
          <th>Severity</th>
          <th>Action</th>
          <th>Model</th>
          <th>Snippet</th>
        </tr>
      </thead>
      <tbody id="eventBody">
        <tr><td colspan="8" class="empty-state">Waiting for events…</td></tr>
      </tbody>
    </table>
  </div>

</div>
</body>
</html>
